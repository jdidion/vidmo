<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Mosaic grid: 4x3 tiles, some filled to suggest progressive video replacement -->
  <rect x="4" y="8" width="18" height="18" rx="2" fill="#7c3aed"/>
  <rect x="24" y="8" width="18" height="18" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="44" y="8" width="18" height="18" rx="2" fill="#7c3aed" opacity="0.3"/>
  <rect x="64" y="8" width="18" height="18" rx="2" fill="#a78bfa"/>

  <rect x="4" y="28" width="18" height="18" rx="2" fill="#a78bfa" opacity="0.4"/>
  <rect x="24" y="28" width="18" height="18" rx="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="44" y="28" width="18" height="18" rx="2" fill="#a78bfa"/>
  <rect x="64" y="28" width="18" height="18" rx="2" fill="#7c3aed" opacity="0.5"/>

  <rect x="4" y="48" width="18" height="18" rx="2" fill="#7c3aed" opacity="0.8"/>
  <rect x="24" y="48" width="18" height="18" rx="2" fill="#a78bfa" opacity="0.5"/>
  <!-- Play button tile -->
  <rect x="44" y="48" width="18" height="18" rx="2" fill="#7c3aed"/>
  <polygon points="51,52 51,62 59,57" fill="white"/>
  <rect x="64" y="48" width="18" height="18" rx="2" fill="#a78bfa" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="96" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#eee" letter-spacing="-1">vidmo</text>
</svg>
